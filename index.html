function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function NetworkField({ accent = "#3770E8", count = 7 }) {
  const nodes = React.useMemo(() => {
    const seed = (i, k) => {
      const x = Math.sin(i * 12.9898 + k * 78.233) * 43758.5453;
      return x - Math.floor(x);
    };
    return Array.from({ length: count }, (_, i) => ({
      x: 8 + seed(i, 1) * 84,
      y: 12 + seed(i, 2) * 76,
      r: 2 + seed(i, 3) * 3.5,
      o: 0.25 + seed(i, 4) * 0.45,
      delay: seed(i, 5) * 6,
      dur: 8 + seed(i, 6) * 6
    }));
  }, [count]);

  const edges = React.useMemo(() => {
    const e = [];
    for (let i = 0; i < nodes.length; i++) {
      const d = nodes.map((n, j) => ({
        j,
        d: j === i ? 1e9 : Math.hypot(n.x - nodes[i].x, n.y - nodes[i].y)
      })).sort((a, b) => a.d - b.d);
      e.push([i, d[0].j]);
      if (d[1] && d[1].d < 40) e.push([i, d[1].j]);
    }
    const seen = new Set();
    return e.filter(([a, b]) => {
      const k = a < b ? a + "-" + b : b + "-" + a;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });
  }, [nodes]);

  return (
    <svg className="net" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <radialGradient id="nodeGlow">
          <stop offset="0%"  stopColor={accent} stopOpacity="0.7" />
          <stop offset="60%" stopColor={accent} stopOpacity="0.15" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </radialGradient>
      </defs>
      {edges.map(([a, b], i) => (
        <line key={i}
          x1={nodes[a].x} y1={nodes[a].y}
          x2={nodes[b].x} y2={nodes[b].y}

function ProjectCards({ projects }) {
  const [visible, setVisible] = React.useState([]);
  React.useEffect(() => {
    setVisible([]);
    projects.forEach((_, i) => {
      setTimeout(() => setVisible(v => [...v, i]), 120 + i * 110);
    });
  }, []);
  return (
    <div className="projects">
      {projects.map((p, i) => (
        <div key={i} className={"pcard" + (visible.includes(i) ? " visible" : "")}
             style={{ transitionDelay: `${i * 0.08}s` }}>
          [ {p} ]
        </div>
      ))}
    </div>
  );
}

function useViewport() {
  const [v, setV] = React.useState(() => ({
    w: typeof window !== "undefined" ? window.innerWidth : 1440,
    h: typeof window !== "undefined" ? window.innerHeight : 900
  }));
  React.useEffect(() => {
    const on = () => setV({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener("resize", on);
    return () => window.removeEventListener("resize", on);
  }, []);
  return { ...v, isMobile: v.w < 760, axis: v.w < 760 ? "h" : "v" };
}

function useSplit({ axis, mode, hover, taken, motion }) {
  let target = 0.5;
  if (taken === "y") target = 1.0;
  else if (taken === "k") target = 0.0;
  else if (motion !== "off") {
    if (hover === "y") target = 0.74;
    if (hover === "k") target = 0.26;
  }
  if (motion === "off" && !taken) target = 0.5;

  const [pos, setPos] = React.useState(0.5);
  const posRef = React.useRef(0.5);
  const targetRef = React.useRef(target);
  const rafRef = React.useRef(null);
  targetRef.current = target;

  React.useEffect(() => {
    cancelAnimationFrame(rafRef.current);
    const tick = () => {
      const cur = posRef.current;
      const next = cur + (targetRef.current - cur) * 0.12;
      if (Math.abs(next - cur) > 0.0005) {
        posRef.current = next;
        setPos(next);
        rafRef.current = requestAnimationFrame(tick);
      } else if (posRef.current !== targetRef.current) {
        posRef.current = targetRef.current;
        setPos(targetRef.current);
        rafRef.current = null;
      }
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(rafRef.current); rafRef.current = null; };
  }, [target]);

  return pos;
}

function MetricTerminal({ stats, accent }) {
  const [active, setActive] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setActive(a => (a + 1) % stats.length), 2600);
    return () => clearInterval(t);
  }, [stats.length]);

  return (
    <div style={{
      position:"relative", width:196, height:170, flexShrink:0,
      background:"rgba(0,0,0,0.28)", borderRadius:16, padding:"16px 18px",
      border:`1px solid rgba(255,255,255,0.14)`,
      boxShadow:`0 20px 60px rgba(0,0,0,0.3), 0 0 32px ${accent}18`,
      fontFamily:"'IBM Plex Mono',monospace",
    }}>
      <div style={{ display:"flex", gap:5, marginBottom:12 }}>
        {[accent, "rgba(255,255,255,0.18)", "rgba(255,255,255,0.18)"].map((c,i) => (
          <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:c, opacity:.75 }} />
        ))}
      </div>
      <div style={{ fontSize:9, letterSpacing:".28em", textTransform:"uppercase",
        color:"rgba(255,255,255,.82)", marginBottom:6 }}>{">"} {stats[active]?.label}</div>
      <div style={{
        fontSize:30, fontWeight:700, color:accent, lineHeight:1,
        letterSpacing:"-.04em", marginBottom:4,
        transition:"color .4s"
      }}>{stats[active]?.value}</div>
      <div style={{ fontSize:8.5, color:"rgba(255,255,255,.72)", letterSpacing:".14em",
        textTransform:"uppercase" }}>{stats[active]?.sub}</div>
      <div style={{ position:"absolute", bottom:14, left:0, right:0,
        display:"flex", justifyContent:"center", gap:5 }}>
        {stats.map((_,i) => (
          <div key={i} onClick={() => setActive(i)} style={{
            width: active===i ? 14 : 5, height:4, borderRadius:99,
            background: active===i ? accent : "rgba(255,255,255,0.14)",
            transition:"all 0.3s ease", cursor:"pointer"
          }} />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [showPortfolio, setShowPortfolio] = React.useState(false);
  const [showYPortfolio, setShowYPortfolio] = React.useState(false);
  const { w, h, isMobile, axis } = useViewport();
  const pal = PALETTES[t.palette] || PALETTES["cobalt-orchid"];

  React.useEffect(() => {
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = pal.yBg;
  }, [pal.yBg]);

  const [hover, setHover] = React.useState(null);
  const [taken, setTaken] = React.useState(null);
  const motion = t.splitMotion;
  const split = useSplit({ axis, hover, taken, motion });

  const [magnet, setMagnet] = React.useState({ x: 0.5, y: 0.5 });
  const magnetRaf = React.useRef(null);
  React.useEffect(() => {
    if (taken || motion === "off" || isMobile) return;
    const on = (e) => {
      if (magnetRaf.current) return;
      const cx = e.clientX, cy = e.clientY;
      magnetRaf.current = requestAnimationFrame(() => {
        setMagnet({ x: cx / w, y: cy / h });
        magnetRaf.current = null;
      });
    };
    window.addEventListener("pointermove", on, { passive: true });
    return () => { window.removeEventListener("pointermove", on); cancelAnimationFrame(magnetRaf.current); };
  }, [taken, motion, isMobile, w, h]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") setTaken(null);
      if (e.key === "T" && e.shiftKey) window.dispatchEvent(new MessageEvent("message", { data: { type: "__activate_edit_mode" } }));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // ── Music ──────────────────────────────────────────────────────────────────
  const audioRef = React.useRef(null);
  const [musicPlaying, setMusicPlaying] = React.useState(false);
  const [autoplayBlocked, setAutoplayBlocked] = React.useState(false);
  const fadeRef = React.useRef(null);

  const startMusic = React.useCallback(() => {
    const audio = audioRef.current;
    if (!audio) return Promise.resolve();
    clearInterval(fadeRef.current);
    audio.volume = 0;
    return audio.play().then(() => {
      setMusicPlaying(true);
      setAutoplayBlocked(false);
      fadeRef.current = setInterval(() => {
        if (audio.volume < 0.35) { audio.volume = Math.min(0.38, audio.volume + 0.03); }
        else { audio.volume = 0.38; clearInterval(fadeRef.current); }
      }, 40);
    });
  }, []);

  React.useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const tryAutoplay = () => {
      startMusic().catch(() => setAutoplayBlocked(true));
    };
    if (audio.readyState >= 3) {
      tryAutoplay();
    } else {
      audio.addEventListener("canplaythrough", tryAutoplay, { once: true });
      return () => audio.removeEventListener("canplaythrough", tryAutoplay);
    }
  }, []); // eslint-disable-line

  React.useEffect(() => {
    if (!autoplayBlocked) return;
    const onInteraction = () => startMusic().catch(() => {});
    document.addEventListener("pointerdown", onInteraction, { once: true });
    return () => document.removeEventListener("pointerdown", onInteraction);
  }, [autoplayBlocked, startMusic]);

  const toggleMusic = React.useCallback(() => {
    const audio = audioRef.current;
    if (!audio) return;
    if (musicPlaying) {
      clearInterval(fadeRef.current);
      fadeRef.current = setInterval(() => {
        if (audio.volume > 0.03) { audio.volume = Math.max(0, audio.volume - 0.04); }
        else { audio.pause(); audio.volume = 0.38; clearInterval(fadeRef.current); }
      }, 40);
      setMusicPlaying(false);
    } else {
      startMusic().catch(() => {});
    }
  }, [musicPlaying, startMusic]);
  // ──────────────────────────────────────────────────────────────────────────

  const handleHover = (side) => { if (!taken) setHover(side); };
  const handleLeave = () => setHover(null);
  const handleTake  = (side) => { setTaken(side); setHover(null); };

  const leftSize  = axis === "v" ? { width: (split * 100) + "%", height: "100%" }
                                 : { width: "100%", height: (split * 100) + "%" };

            <div className="wm-layer wm-y" style={{ clipPath: `inset(-6px ${(1 - split) * 100}% -6px 0)` }}>
              <span className="mark">MERZA FAMILY</span>
              <span className="sub">
                <span className="side left">product</span>
                <span className="dot"></span>
                <span className="side right">design</span>
              </span>
            </div>
            <div className="wm-layer wm-k" style={{ clipPath: `inset(-6px 0 -6px ${split * 100}%)` }}>
              <span className="mark">MERZA FAMILY</span>
              <span className="sub">
                <span className="side left">product</span>
                <span className="dot"></span>
                <span className="side right">design</span>
              </span>
            </div>
          </div>
        )}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Worlds" />
        <TweakSelect label="Palette" value={t.palette}
          options={Object.keys(PALETTES).map(k => ({ value: k, label: PALETTES[k].label }))}
          onChange={(v) => setTweak("palette", v)} />

        <TweakSection label="Motion" />
        <TweakRadio label="Split" value={t.splitMotion}
          options={[
            { value: "magnetic", label: "Magnetic" },
            { value: "snap",     label: "Snap" },
            { value: "off",      label: "Off" }
          ]}
          onChange={(v) => setTweak("splitMotion", v)} />

        <TweakSection label="The Line" />
        <TweakRadio label="Style" value={t.lineStyle}
          options={[
            { value: "gradient", label: "Gradient" },
            { value: "subtle",   label: "Whisper" },
            { value: "solid",    label: "Solid" }
          ]}
          onChange={(v) => setTweak("lineStyle", v)} />

        <TweakSection label="Detail" />
        <TweakToggle label="Decorative scenes" value={t.showDecor}
          onChange={(v) => setTweak("showDecor", v)} />
        <TweakToggle label="Wordmark" value={t.showWordmark}
          onChange={(v) => setTweak("showWordmark", v)} />
      </TweaksPanel>

      {showYPortfolio && <YaroslavPortfolioPage onClose={() => setShowYPortfolio(false)} />}
      {showPortfolio && <PortfolioPage onClose={() => setShowPortfolio(false)} />}

      <MusicButton playing={musicPlaying} blocked={autoplayBlocked} onClick={toggleMusic} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
